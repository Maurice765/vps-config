name: Trivy daily image scan

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to ghcr.io (for Trivy DB pulls)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.70.0

      - name: Scan images and build summary
        id: scan
        run: |
          set -uo pipefail

          images=$(grep -rhoP '(?<=^Image=).*' services/*/files/*.container 2>/dev/null | sort -u || true)
          if [ -z "$images" ]; then
            echo "No images discovered — check services/*/files/*.container" >&2
            exit 1
          fi
          echo "Discovered images:"
          echo "$images"

          summary=""
          total=0
          max_cve_lines=15
          full_report="$GITHUB_WORKSPACE/trivy-full-report.txt"
          {
            echo "Trivy daily image scan — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Filters: severity CRITICAL,HIGH; fixed only (--ignore-unfixed)"
            echo
          } > "$full_report"

          while IFS= read -r image; do
            [ -z "$image" ] && continue
            echo "::group::Scanning $image"
            report=$(mktemp)

            if ! trivy image \
                  --quiet \
                  --scanners vuln \
                  --severity CRITICAL,HIGH \
                  --ignore-unfixed \
                  --format json \
                  --exit-code 0 \
                  --output "$report" \
                  "$image"; then
              echo "scan failed for $image"
              summary="${summary}${image} — scan failed"$'\n'
              {
                echo "=== ${image}: scan failed ==="
                echo
              } >> "$full_report"
              rm -f "$report"
              echo "::endgroup::"
              continue
            fi

            counts=$(jq -r '
              [.Results[]?.Vulnerabilities[]? | .Severity] as $sev
              | "\(($sev | map(select(. == "CRITICAL")) | length)) \(($sev | map(select(. == "HIGH")) | length))"
            ' "$report")
            crit=$(echo "$counts" | cut -d" " -f1)
            high=$(echo "$counts" | cut -d" " -f2)
            crit=${crit:-0}
            high=${high:-0}

            echo "$image: $crit CRITICAL, $high HIGH"

            if [ "$crit" -gt 0 ] || [ "$high" -gt 0 ]; then
              cve_details=$(jq -r '
                .Results[]?.Vulnerabilities[]?
                | "  • \(.VulnerabilityID) (\(.Severity) in \(.PkgName))"
              ' "$report" | sort -u)

              # Full, uncapped list goes to the artifact.
              {
                echo "=== ${image}: ${crit} CRITICAL, ${high} HIGH ==="
                printf '%s\n\n' "$cve_details"
              } >> "$full_report"

              # Capped list goes to the (size-limited) ntfy notification body.
              cve_lines=$(printf '%s\n' "$cve_details" | wc -l)
              capped=$(printf '%s\n' "$cve_details" | head -n "$max_cve_lines")
              if [ "$cve_lines" -gt "$max_cve_lines" ]; then
                capped="${capped}"$'\n'"  … and $((cve_lines - max_cve_lines)) more (see workflow artifact)"
              fi
              summary="${summary}📦 ${image}: ${crit} CRIT, ${high} HIGH"$'\n'"${capped}"$'\n\n'
              total=$((total + crit + high))
            else
              {
                echo "=== ${image}: clean ==="
                echo
              } >> "$full_report"
            fi

            rm -f "$report"
            echo "::endgroup::"
          done <<< "$images"

          echo "Total CRITICAL+HIGH findings: $total"

          {
            echo "total=$total"
            echo "summary<<SUMMARY_EOF"
            printf '%s' "$summary"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload full Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-full-report
          path: trivy-full-report.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Notify via ntfy
        if: steps.scan.outputs.total != '0'
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          SUMMARY: ${{ steps.scan.outputs.summary }}
        run: |
          set -euo pipefail
          if [ -z "${NTFY_URL:-}" ]; then
            echo "NTFY_URL secret is not set" >&2
            exit 1
          fi
          curl -sf \
            -H "Title: Trivy: vulnerabilities in VPS images" \
            -H "Priority: high" \
            -H "Tags: warning,shield" \
            -d "$SUMMARY" \
            "$NTFY_URL"

      - name: Report clean result
        if: steps.scan.outputs.total == '0'
        run: echo "No CRITICAL/HIGH vulnerabilities found — no notification sent."
