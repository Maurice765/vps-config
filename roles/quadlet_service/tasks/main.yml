---
# =============================================================================
# roles/quadlet_service/tasks/main.yml
# Deploy a single rootless Quadlet service for the apprunner user
# =============================================================================
- name: "Deploy service: {{ quadlet_service_name }}"
  become: true
  become_user: "{{ podman_user }}"
  environment:
    XDG_RUNTIME_DIR: "{{ apprunner_xdg }}"
  block:
    # -------------------------------------------------------------------------
    # 1. Load the service manifest (file lists, secrets, values)
    # -------------------------------------------------------------------------
    - name: Load service-specific variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/services/{{ quadlet_service_name }}/vars.yml"

    - name: Create the service runtime directory
      ansible.builtin.file:
        path: "{{ podman_user_home }}/services/{{ quadlet_service_name }}"
        state: directory
        mode: '0755'

    # -------------------------------------------------------------------------
    # 2. Podman secrets
    # -------------------------------------------------------------------------
    - name: Create Podman secrets for the service
      containers.podman.podman_secret:
        name: "{{ item.name }}"
        data: "{{ item.data }}"
        state: present
        force: true
      loop: "{{ quadlet_service_secrets }}"
      no_log: true

    # -------------------------------------------------------------------------
    # 3. Copy Quadlet files -> ~/.config/containers/systemd/
    # -------------------------------------------------------------------------
    - name: Copy Quadlet files
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/services/{{ quadlet_service_name }}/files/{{ item }}"
        dest: "{{ podman_user_home }}/.config/containers/systemd/{{ item }}"
        mode: '0644'
      loop: "{{ quadlet_service_quadlet_files }}"
      register: quadlet_service_quadlet_result

    # -------------------------------------------------------------------------
    # 4. Copy native systemd units -> ~/.config/systemd/user/
    # -------------------------------------------------------------------------
    - name: Copy native systemd units
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/services/{{ quadlet_service_name }}/files/{{ item }}"
        dest: "{{ podman_user_home }}/.config/systemd/user/{{ item }}"
        mode: '0644'
      loop: "{{ quadlet_service_systemd_units }}"
      register: quadlet_service_systemd_result

    # -------------------------------------------------------------------------
    # 5. Copy static config files -> ~/services/<name>/
    # -------------------------------------------------------------------------
    - name: Copy static config files
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/services/{{ quadlet_service_name }}/files/{{ item }}"
        dest: "{{ podman_user_home }}/services/{{ quadlet_service_name }}/{{ item }}"
        mode: '0644'
      loop: "{{ quadlet_service_config_files }}"
      register: quadlet_service_config_result

    # -------------------------------------------------------------------------
    # 6. Render templated files -> ~/services/<name>/
    # -------------------------------------------------------------------------
    - name: Render templated files
      ansible.builtin.template:
        src: "{{ playbook_dir }}/services/{{ quadlet_service_name }}/templates/{{ item }}"
        dest: >-
          {{ podman_user_home }}/services/{{ quadlet_service_name }}/{{ item | regex_replace('\.j2$', '') }}
        mode: '0640'
      loop: "{{ quadlet_service_template_files }}"
      register: quadlet_service_template_result

    # -------------------------------------------------------------------------
    # 7. Distill the copy/template results into two change flags
    # -------------------------------------------------------------------------
    - name: Determine whether a unit file changed
      ansible.builtin.set_fact:
        quadlet_service_units_changed: >-
          {{ (quadlet_service_quadlet_result.changed | default(false))
             or (quadlet_service_systemd_result.changed | default(false)) }}

    - name: Determine whether a config or template file changed
      ansible.builtin.set_fact:
        quadlet_service_config_changed: >-
          {{ (quadlet_service_config_result.changed | default(false))
             or (quadlet_service_template_result.changed | default(false)) }}

    # -------------------------------------------------------------------------
    # 8. Reload the systemd user daemon (only if a unit file changed)
    # -------------------------------------------------------------------------
    - name: Reload the systemd user daemon
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user
      when: quadlet_service_units_changed

    # -------------------------------------------------------------------------
    # 9. Restart units (only if a unit, config or template file changed)
    # -------------------------------------------------------------------------
    - name: Restart service units after a change
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
        scope: user
      loop: "{{ quadlet_service_start_units }}"
      when: quadlet_service_units_changed or quadlet_service_config_changed

    # -------------------------------------------------------------------------
    # 10. Always ensure units are started and enabled
    # -------------------------------------------------------------------------
    - name: Ensure service units are started and enabled
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
        scope: user
      loop: "{{ quadlet_service_start_units }}"
