---
# =============================================================================
# roles/quadlet_service/handlers/main.yml
# Handlers for the quadlet_service role
# =============================================================================
- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ podman_user }}"
  environment:
    XDG_RUNTIME_DIR: "{{ apprunner_xdg }}"
