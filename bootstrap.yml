---
# =============================================================================
# bootstrap.yml
# One-time, root-level setup for the VPS
# =============================================================================
- name: Bootstrap VPS for rootless Podman
  hosts: vps
  become: true
  gather_facts: true

  tasks:
    # -------------------------------------------------------------------------
    # 1. Unprivileged system user
    # -------------------------------------------------------------------------
    - name: Create the unprivileged apprunner system user
      ansible.builtin.user:
        name: "{{ podman_user }}"
        create_home: true
        shell: /bin/bash
        state: present
      register: apprunner_user

    # -------------------------------------------------------------------------
    # 2. Enable lingering
    # -------------------------------------------------------------------------
    - name: Check current linger status for apprunner
      ansible.builtin.command: "loginctl show-user {{ podman_user }} --property=Linger --value"
      register: linger_status
      changed_when: false
      failed_when: false

    - name: Enable lingering for apprunner
      ansible.builtin.command: "loginctl enable-linger {{ podman_user }}"
      changed_when: true
      when: linger_status.stdout | trim != 'yes'

    # -------------------------------------------------------------------------
    # 3. Allow rootless containers to bind privileged ports
    # -------------------------------------------------------------------------
    - name: Allow unprivileged ports starting from port 80
      ansible.posix.sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: '80'
        state: present
        sysctl_file: /etc/sysctl.d/99-unprivileged-ports.conf
        sysctl_set: true
        reload: true

    # -------------------------------------------------------------------------
    # 4. Base directories owned by apprunner
    # -------------------------------------------------------------------------
    - name: Create base directories for apprunner
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: "{{ podman_user }}"
        group: "{{ podman_user }}"
      loop:
        - "{{ podman_user_home }}/.ansible/tmp"
        - "{{ podman_user_home }}/.config/containers/systemd"
        - "{{ podman_user_home }}/.config/systemd/user"
        - "{{ podman_user_home }}/services"
