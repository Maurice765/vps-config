---
# =============================================================================
# deploy.yml
# Deployment of all rootless Quadlet services.
# =============================================================================
- name: Deploy Quadlet services
  hosts: quadlet_hosts
  gather_facts: true

  tasks:
    # -------------------------------------------------------------------------
    # 1. Resolve the apprunner UID for the systemd user session
    # -------------------------------------------------------------------------
    - name: Look up apprunner UID
      ansible.builtin.getent:
        database: passwd
        key: "{{ podman_user }}"

    - name: Set the XDG runtime path
      ansible.builtin.set_fact:
        apprunner_xdg: "/run/user/{{ ansible_facts['getent_passwd'][podman_user][1] }}"

    # -------------------------------------------------------------------------
    # 2. Deploy each service
    # -------------------------------------------------------------------------
    - name: Deploy ntfy
      ansible.builtin.include_role:
        name: quadlet_service
      vars:
        quadlet_service_name: ntfy
      tags: ntfy

    - name: Deploy kitchenowl
      ansible.builtin.include_role:
        name: quadlet_service
      vars:
        quadlet_service_name: kitchenowl
      tags: kitchenowl

    - name: Deploy mollysocket
      ansible.builtin.include_role:
        name: quadlet_service
      vars:
        quadlet_service_name: mollysocket
      tags: mollysocket

    - name: Deploy landzunge
      ansible.builtin.include_role:
        name: quadlet_service
      vars:
        quadlet_service_name: landzunge
      tags: landzunge

    - name: Deploy caddy
      ansible.builtin.include_role:
        name: quadlet_service
      vars:
        quadlet_service_name: caddy
      tags: caddy
